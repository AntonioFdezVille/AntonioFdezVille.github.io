<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Web en Configuración</title>
    <style>
        /* Estilos generales */
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ocupa al menos el alto completo de la pantalla */
            box-sizing: border-box;
        }

        /* Contenedor principal expandido */
        .galeria {
            display: flex;
            flex-wrap: wrap;
            gap: 40px; /* Espacio entre las fotos */
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1800px; /* Límite mucho más amplio para pantallas grandes */
        }

        /* Contenedor individual mucho más grande */
        .foto-box {
            flex: 1 1 45%; /* Cada foto intentará ocupar el 45% del ancho de la pantalla */
            min-width: 320px; /* Si la pantalla es pequeña (móvil), se pondrán una debajo de otra */
            background-color: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        /* Ajuste de la imagen al nuevo tamaño */
        .foto-box img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
            display: block; /* Evita pequeños márgenes blancos debajo de la imagen */
        }
    </style>
</head>
<body>

    <div class="galeria">
        <!-- Contenedor Foto 1 -->
        <div class="foto-box">
            <img src="foto1.png" alt="Foto 1">
        </div>

        <!-- Contenedor Foto 2 -->
        <div class="foto-box">
            <img src="foto2.jpeg" alt="Foto 2">
        </div>
    </div>

</body>
</html>
